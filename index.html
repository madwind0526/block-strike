<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolling Block Strike</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main class="shell">
    <section class="phone" aria-label="Rolling Block Strike game">
      <header class="top-board">
        <div class="mini-panel">
          <span>Stage</span>
          <strong id="stage-value">1</strong>
        </div>
        <h1 class="logo-title" aria-label="Rolling Block Strike">
          <img src="assets/images/logo-rolling-block-strike.png" alt="Rolling Block Strike" />
        </h1>
        <div class="score-panel">
          <div class="mini-panel">
            <span>Score</span>
            <strong id="score-value">0</strong>
          </div>
          <div class="lives-panel">
            <span>Hearts</span>
            <strong id="lives-value">3</strong>
          </div>
        </div>
      </header>

      <canvas id="game" width="506" height="760"></canvas>

      <div class="item-bar">
        <button id="btn-pause" class="item pause" type="button" aria-label="Pause">
          <img src="assets/images/item-pause.svg" alt="Pause" />
        </button>
        <div class="item power">
          <span class="item-icon rocket"><img src="assets/images/item-rocket.png" alt="" /></span>
          <strong id="rocket-value">0</strong>
        </div>
        <div class="item power status">
          <span class="item-icon slow"><img src="assets/images/item-slow.png" alt="" /></span>
          <strong id="slow-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon x3"><img src="assets/images/item-x3.png" alt="" /></span>
          <strong id="x3-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon wide"><img src="assets/images/item-wide.png" alt="" /></span>
          <strong id="wide-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon bomb"><img src="assets/images/item-bomb.png" alt="" /></span>
          <strong id="bomb-value">3</strong>
        </div>
        <div class="item power">
          <span class="item-icon shield"><img src="assets/images/item-shield.png" alt="" /></span>
          <strong id="shield-value">0</strong>
        </div>
      </div>

      <p class="hint">Break the main face. Hidden power blocks can turn one clean bounce into a strike.</p>
    </section>
  </main>

  <script src="src/game.js"></script>
</body>
</html>
