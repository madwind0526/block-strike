<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolling Block Strike</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main class="shell">
    <section class="phone" aria-label="Rolling Block Strike game">
      <header class="top-board">
        <div class="hud-stack stage-stack">
          <div class="mini-panel">
            <span>Stage</span>
            <strong id="stage-value">1</strong>
          </div>
          <div class="mini-panel rank-panel">
            <span>Rank</span>
            <strong id="rank-value">128</strong>
          </div>
        </div>
        <h1 class="logo-title" aria-label="Rolling Block Strike">
          <img src="assets/images/logo-rolling-block-strike-Photoroom.png" alt="Rolling Block Strike" />
        </h1>
        <div class="score-panel">
          <div class="mini-panel">
            <span>Score</span>
            <strong id="score-value">0</strong>
          </div>
          <div class="lives-panel">
            <span>Lives</span>
            <strong id="lives-value">3</strong>
          </div>
        </div>
      </header>

      <div class="game-wrap">
        <canvas id="game" width="506" height="760"></canvas>
        <button id="face-left" class="face-nav face-left" type="button" aria-label="Previous face">&lt;</button>
        <button id="face-right" class="face-nav face-right" type="button" aria-label="Next face">&gt;</button>
      </div>

      <div class="item-bar">
        <button id="btn-pause" class="item pause" type="button" aria-label="Pause">
          <img src="assets/images/item-pause.svg" alt="Pause" />
        </button>
        <div class="item power">
          <span class="item-icon rocket"><img src="assets/images/item-rocket.png" alt="" /></span>
          <strong id="rocket-value">0</strong>
        </div>
        <div class="item power status">
          <span class="item-icon slow"><img src="assets/images/item-slow.png" alt="" /></span>
          <strong id="slow-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon x3"><img src="assets/images/item-x3.png" alt="" /></span>
          <strong id="x3-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon wide"><img src="assets/images/item-wide.png" alt="" /></span>
          <strong id="wide-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon bomb"><img src="assets/images/item-bomb.png" alt="" /></span>
          <strong id="bomb-value">0</strong>
        </div>
        <div class="item power">
          <span class="item-icon shield"><img src="assets/images/item-shield.png" alt="" /></span>
          <strong id="shield-value">0</strong>
        </div>
      </div>

      <p class="hint">Break the main face. Hidden power blocks can turn one clean bounce into a strike.</p>

      <div id="cheat-status" class="cheat-status hidden" aria-hidden="true">
        <div data-cheat="godMode">godMode</div>
        <div data-cheat="fullLives">fullLives</div>
        <div data-cheat="immortal">Immortal</div>
        <div data-cheat="jumpTo">JumpTo</div>
      </div>

      <div id="face-status" class="face-status hidden" aria-label="Remaining blocks by face"></div>

      <div id="screen-overlay" class="screen-overlay intro-screen">
        <img class="overlay-logo" src="assets/images/IntroLogo2.png" alt="Rolling Block Strike" />
        <div id="overlay-title" class="overlay-title"></div>
        <img id="overlay-gameover" class="overlay-gameover" src="assets/images/GameOver.png" alt="Game Over" />
        <img id="overlay-nextstage" class="overlay-nextstage" src="assets/images/NextStage.png" alt="Next Stage" />
        <div id="overlay-score" class="overlay-score"></div>
        <label id="name-entry" class="name-entry">
          <span>Name</span>
          <input id="player-name" type="text" maxlength="10" autocomplete="off" spellcheck="false" />
        </label>
        <img id="overlay-topranks" class="overlay-topranks" src="assets/images/TopRanks.png" alt="Top Ranks" />
        <div id="rank-list" class="rank-list"></div>
        <div id="overlay-prompt" class="overlay-prompt">Press Enter to Start</div>
      </div>

      <div id="debug-overlay" class="debug-overlay hidden" aria-hidden="true">
        <form id="debug-panel" class="debug-panel">
          <div class="debug-title">Debug Command</div>
          <label class="debug-field">
            <span>Command</span>
            <select id="debug-command">
              <option value="fullLives">fullLives</option>
              <option value="godMode">godMode</option>
              <option value="goodGame">goodGame</option>
              <option value="immortal">immortal</option>
              <option value="jumpTo">jumpTo</option>
              <option value="resetData">resetData</option>
              <option value="showRank">showRank</option>
            </select>
          </label>
          <label id="debug-stage-field" class="debug-field hidden">
            <span>Stage</span>
            <input id="debug-stage" type="number" min="1" max="99999" value="1" />
          </label>
          <div class="debug-actions">
            <button id="debug-cancel" type="button">Cancel</button>
            <button type="submit">Apply</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script src="src/game.js"></script>
</body>
</html>
